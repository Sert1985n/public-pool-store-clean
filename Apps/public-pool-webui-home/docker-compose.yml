name: public-pool-webui-home
services:
  app:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8500:80"
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        mkdir -p /usr/share/nginx/html /etc/nginx/conf.d
        cat > /etc/nginx/conf.d/default.conf <<'EOF_CONF'
        server { listen 80; server_name _; root /usr/share/nginx/html; index index.html; location / { try_files $uri $uri/ /index.html; } }
        EOF_CONF
        cat > /usr/share/nginx/html/index.html <<'EOF_HTML'
        <!doctype html>
        <html lang="ru">
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>public-pool-btc.ru — SOLO Mining Pool</title>
          <meta name="description" content="Public Pool BTC RU home page with live Miningcore backend data.">
          <link rel="stylesheet" href="/styles.css">
        </head>
        <body>
          <div class="container">
            <div class="topbar">
              <div>
                <div class="brand">public-pool-btc.ru</div>
                <div class="subtitle">SOLO pool home · live data from Miningcore API</div>
              </div>
              <a class="btn" href="#coins">Монеты</a>
            </div>
        
            <div class="hero">
              <h1>Наши монеты</h1>
              <p>Главная страница пула. Переходы ведут на отдельные страницы монет. API берётся с текущего сервера.</p>
            </div>
        
            <section id="coins" class="coins"></section>
        
            <footer class="footer">© public-pool-btc.ru - 2026</footer>
          </div>
          <script src="/config.js"></script>
          <script src="/app.js"></script>
        </body>
        </html>
        
        EOF_HTML
        cat > /usr/share/nginx/html/styles.css <<'EOF_CSS'
        
        :root{--bg:#0b0f16;--panel:#111827;--panel2:#0f172a;--line:rgba(255,255,255,.08);--text:#e5e7eb;--muted:#9ca3af;--accent:#f59e0b;}
        *{box-sizing:border-box}html,body{margin:0;padding:0;background:linear-gradient(180deg,#08111c,#0b0f16 30%,#0b0f16);color:var(--text);font-family:Inter,Arial,sans-serif}
        a{color:inherit;text-decoration:none}.container{max-width:1180px;margin:0 auto;padding:20px}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.brand{font-size:32px;font-weight:800}.subtitle{color:var(--muted);margin-top:6px}.btn{background:#1f2937;border:1px solid var(--line);padding:10px 14px;border-radius:12px}.hero{background:linear-gradient(135deg,#0f172a,#111827);border:1px solid var(--line);border-radius:24px;padding:22px 24px;margin-bottom:24px}.hero h1{margin:0 0 8px;font-size:30px}.hero p{margin:0;color:var(--muted)}.coins{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}.card{background:linear-gradient(180deg,#111827,#0f172a);border:1px solid var(--line);border-radius:22px;padding:18px;display:flex;flex-direction:column;gap:12px}.icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;background:#1f2937;border:1px solid var(--line)}.name{font-size:20px;font-weight:700}.muted{color:var(--muted)}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:14px;padding:10px}.stat .label{font-size:12px;color:var(--muted);margin-bottom:6px}.stat .value{font-size:14px;font-weight:700}.footer{margin-top:26px;color:var(--muted);text-align:center;padding:10px 0}
        
        EOF_CSS
        cat > /usr/share/nginx/html/config.js <<'EOF_CFG'
        window.PUBLIC_POOL_UI={brandName:'public-pool-btc.ru',footer:'© public-pool-btc.ru - 2026',apiBase:`${location.protocol}//${location.hostname}:4000/api`,siteBase:`${location.protocol}//${location.hostname}`,ports:{home:8500,btc:8501,bch:8502,bc2:8503,btcs:8504,lcc:8505,wjk:8506,rvn:8507},coins:[{id:'btc',title:'Bitcoin',symbol:'BTC'},{id:'bch',title:'Bitcoin Cash',symbol:'BCH'},{id:'bc2',title:'BitcoinII',symbol:'BC2'},{id:'btcs',title:'Bitcoin Silver',symbol:'BTCS'},{id:'lcc',title:'Litecoin Cash',symbol:'LCC'},{id:'wjk',title:'Wojakcoin',symbol:'WJK'},{id:'rvn',title:'Ravencoin',symbol:'RVN'}]};
        EOF_CFG
        cat > /usr/share/nginx/html/app.js <<'EOF_JS'
        const UI=window.PUBLIC_POOL_UI;const fmt=n=>{n=Number(n);if(!Number.isFinite(n)||n<=0)return '—';const u=['H/s','KH/s','MH/s','GH/s','TH/s','PH/s','EH/s'];let i=0;while(n>=1000&&i<u.length-1){n/=1000;i++}return `${n.toFixed(n>=100?0:n>=10?1:2)} ${u[i]}`};const byId=Object.fromEntries(UI.coins.map(c=>[c.id,c]));const icons={btc:'₿',bch:'Ƀ',bc2:'Ⅱ',btcs:'S',lcc:'Ł',wjk:'W',rvn:'R'};async function load(){let pools=[];try{const r=await fetch(`${UI.apiBase}/pools`);if(r.ok)pools=await r.json()}catch(e){}const root=document.getElementById('coins');root.innerHTML='';UI.coins.forEach(c=>{const p=(Array.isArray(pools)?pools:[]).find(x=>x.id===c.id)||{};const a=document.createElement('a');a.className='card';a.href=`${UI.siteBase}:${UI.ports[c.id]}`;a.innerHTML=`<div class="icon">${icons[c.id]||c.symbol[0]}</div><div class="name">${c.title} <span class="muted">(${c.symbol})</span></div><div class="stats"><div class="stat"><div class="label">Pool</div><div class="value">${fmt(p.poolStats?.poolHashrate||p.poolHashrate)}</div></div><div class="stat"><div class="label">Network</div><div class="value">${fmt(p.networkStats?.networkHashrate||p.networkHashrate)}</div></div><div class="stat"><div class="label">Blocks</div><div class="value">${p.poolStats?.totalBlocks ?? p.totalBlocks ?? 0}</div></div><div class="stat"><div class="label">Fee</div><div class="value">${p.poolFeePercent ?? 1.5}%</div></div></div>`;root.appendChild(a)})}load();
        EOF_JS
        exec nginx -g 'daemon off;'
x-casaos:
  architectures:
    - amd64
    - arm64
  main: app
  author: public-pool-btc.ru
  category: Web UI
  developer: public-pool-btc.ru
  icon: https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-home/icon.png
  thumbnail: https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-home/icon.png
  title:
    en_us: "Public Pool Web UI Home"
  tagline:
    en_us: "Custom public-pool-btc.ru Web UI"
  description:
    en_us: "Self-contained Web UI app for public-pool-btc.ru without external file mounts."
  port_map: "8500"

name: public-pool-panel-home
services:
  app:
    image: python:3.12-alpine
    container_name: public-pool-panel-home
    restart: unless-stopped
    extra_hosts:
    - host.docker.internal:host-gateway
    ports:
    - 8600:8600
    environment:
    - APP_MODE=home
    - PORT=8600
    - APP_TITLE=Public Pool Panel
    - HOME_URL=/
    - COINS_JSON=[{"symbol":"AUR","name":"Auroracoin","algo":"Scrypt"},{"symbol":"BTC","name":"Bitcoin","algo":"SHA-256"},{"symbol":"BCH","name":"Bitcoin
      Cash","algo":"SHA-256"},{"symbol":"BCH2","name":"Bitcoin Cash II","algo":"SHA-256"},{"symbol":"BC2","name":"BitcoinII","algo":"SHA-256"},{"symbol":"BTCS","name":"Bitcoin

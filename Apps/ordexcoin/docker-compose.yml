# TEMPLATE APP
# Build/publish image from source first, then replace local/ordexcoin:latest with your built image.
# Source repo: https://github.com/OrdexCoin/Ordexcoin-Core
name: retro-mike-ordexcoin
services:
  app:
    container_name: ordexcoin
    image: local/ordexcoin:latest
    restart: always
    volumes:
      - /media/ZimaOS-HD/NodeData/ordexcoin:/root/.ordexcoin
    ports:
      - "7026:7026"
      - "9026:9026"
      - "9333:9333"
x-casaos:
  architectures:
    - amd64
  main: app
  description:
    en_us: OrdexCoin Node Template. Template added to project structure. Build/import image first.
  tagline:
    en_us: Build-required node template for ORDX.
  developer: Retro Mike
  author: Retro Mike
  icon: https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/ordexcoin/icon.png
  thumbnail: ""
  title:
    en_us: OrdexCoin Node Template
  category: RetroMike
  port_map: "8888"

name: retro-mike-bitcoin-cash-ii
services:
  app:
    container_name: app-bitcoin-cash-ii
    image: theretromike/nodes:bitcoincashii
    restart: always
    volumes:
      - /media/ZimaOS-HD/NodeData/app-bitcoin-cash-ii:/data
    ports:
      - "7116:7016"
      - "9116:9016"
    entrypoint: /bin/sh
    command: >
      -lc '
      set -e;
      BIN="";
      for x in /usr/bin/bitcoind /usr/local/bin/bitcoind; do
        [ -x "$x" ] && BIN="$x" && break;
      done;
      [ -n "$BIN" ] || { echo "BCH2 daemon not found"; exit 1; };
      exec "$BIN"
      -datadir=/data
      -printtoconsole
      -server=1
      -prune=550
      -rpcbind=0.0.0.0
      -rpcallowip=0.0.0.0/0
      -rpcport=9016
      -rpcuser=pooluser
      -rpcpassword=poolpassword
      -zmqpubhashblock=tcp://0.0.0.0:7016
      '
x-casaos:
  architectures:
    - amd64
  main: app
  description:
    en_us: Bitcoin Cash II cryptocurrency node.
  tagline:
    en_us: Bitcoin Cash II (BCH2) Node.
  developer: public-pool-btc.ru
  author: public-pool-btc.ru
  icon: https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/bitcoin-cash-ii/icon.png
  thumbnail: ""
  title:
    en_us: Bitcoin Cash II (BCH2) Node
  category: RetroMike
  port_map: "9116"

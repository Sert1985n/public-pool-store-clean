# TEMPLATE APP
# Build/publish image from source first, then replace local/hypercoin:latest with your built image.
# Source repo: https://github.com/hypercoin-prj/hypercoin
name: retro-mike-hypercoin
services:
  app:
    container_name: hypercoin
    image: local/hypercoin:latest
    restart: always
    volumes:
      - /media/ZimaOS-HD/NodeData/hypercoin:/root/.hypercoin
    ports:
      - "7028:7028"
      - "9028:9028"
      - "3333:3333"
x-casaos:
  architectures:
    - amd64
  main: app
  description:
    en_us: Hypercoin Node Template. Template added to project structure. Build/import image first.
  tagline:
    en_us: Build-required node template for HYPER.
  developer: Retro Mike
  author: Retro Mike
  icon: https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/hypercoin/icon.png
  thumbnail: ""
  title:
    en_us: Hypercoin Node Template
  category: RetroMike
  port_map: "8888"

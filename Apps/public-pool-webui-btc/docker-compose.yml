name: public-pool-webui-btc
services:
  app:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8501:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
x-casaos:
  architectures:
    - amd64
    - arm64
  main: app
  author: public-pool-btc.ru
  category: Web UI
  developer: public-pool-btc.ru
  icon: https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-btc/icon.png
  thumbnail: https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-btc/icon.png
  title:
    en_us: "Public Pool Web UI BTC"
  tagline:
    en_us: "BTC reference page 8501"
  description:
    en_us: "Custom public-pool-btc.ru BTC page with Home, Blocks, Miners, Help and Pools link to 8500."
  port_map: "8501"

name: public-pool-panel-auroracoin
services:
  app:
    image: python:3.12-alpine
    container_name: public-pool-panel-auroracoin
    restart: unless-stopped
    extra_hosts:
    - host.docker.internal:host-gateway
    ports:
    - 8601:8601
    environment:
    - APP_MODE=coin
    - PORT=8601
    - APP_TITLE=Auroracoin Pool Panel
    - HOME_URL=http://host.docker.internal:8600
    - COIN_ALGO=Scrypt
    - API_UPSTREAM=http://host.docker.internal:4000
    command:
    - /bin/sh
    - -lc
    - 'set -eu

      apk add --no-cache wget tar

      mkdir -p /srv/site /srv/app

      wget -qO /tmp/site.tar.gz "https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-panel-auroracoin/site.tar.gz"

      tar -xzf /tmp/site.tar.gz -C /srv/site

      wget -qO /srv/app/server.py "https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-panel-auroracoin/server.py"

      SITE_ROOT=/srv/site python3 /srv/app/server.py'
x-casaos:
  architectures:
  - amd64
  - arm64
  main: app
  store_app_id: public-pool-panel-auroracoin
  category: Web UI
  title:
    en_us: Public Pool Panel AUR
  tagline:
    en_us: Auroracoin panel
  description:
    en_us: CasaOS pool panel for Auroracoin, based on uploaded Molepool files.
  developer: Public Pool
  author: Public Pool
  icon: https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-panel-auroracoin/icon.png
  thumbnail: https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-panel-auroracoin/icon.png
  port_map: '8601'

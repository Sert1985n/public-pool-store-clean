      SHA256","algo":"SHA-256"},{"symbol":"MARMARA","name":"Marmara","algo":"Equihash"},{"symbol":"XMR","name":"Monero","algo":"RandomX"},{"symbol":"XNA","name":"NeurAI","algo":"KawPow"},{"symbol":"NITO","name":"Nito","algo":"GhostRider"},{"symbol":"ORDEX","name":"OrdexCoin","algo":"SHA-256"},{"symbol":"PPC","name":"Peercoin","algo":"SHA-256"},{"symbol":"PEPEW","name":"PepePOW","algo":"ProgPow"},{"symbol":"ARRR","name":"Pirate","algo":"Equihash"},{"symbol":"RVN","name":"Ravencoin","algo":"KawPow"},{"symbol":"RBL","name":"RebelCoin","algo":"Scrypt"},{"symbol":"SQUISHY","name":"SquishyCoinQT","algo":"Scrypt"},{"symbol":"TKL","name":"Tokel","algo":"Equihash"},{"symbol":"VICE","name":"ViceversaChain","algo":"Scrypt"},{"symbol":"WJK","name":"Wojakcoin","algo":"Scrypt"},{"symbol":"ZEC","name":"Zcash","algo":"Equihash"},{"symbol":"ZEPH","name":"Zephyr","algo":"RandomX"}]

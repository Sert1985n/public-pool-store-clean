name: public-pool-webui-bsv
services:
  app:
    image: python:3.12-alpine
    container_name: public-pool-webui-bsv
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8503:8503"
    environment:
      - APP_MODE=coin
      - PORT=8503
      - API_UPSTREAM=http://host.docker.internal:4000
      - ID_API_UPSTREAM=
    command:
      - /bin/sh
      - -lc
      - |
          set -eu
          apk add --no-cache wget tar
          mkdir -p /srv/site /srv/app
          wget -qO /tmp/site.tar.gz "https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-bsv/site.tar.gz"
          tar -xzf /tmp/site.tar.gz -C /srv/site
          wget -qO /srv/app/server.py "https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-bsv/server.py"
          SITE_ROOT=/srv/site python3 /srv/app/server.py
x-casaos:
  architectures:
    - amd64
    - arm64
  main: app
  store_app_id: public-pool-webui-bsv
  category: Web UI
  title:
    en_us: "Public Pool Web UI BSV"
  tagline:
    en_us: "Molepool-based pool panel"
  description:
    en_us: "Panel from uploaded Molepool files with local API proxy for CasaOS."
  developer: "Public Pool"
  author: "Public Pool"
  icon: "https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-bsv/icon.png"
  thumbnail: "https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-bsv/icon.png"
  port_map: "8503"

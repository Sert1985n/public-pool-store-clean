# TEMPLATE APP
# Build/publish image first, then replace local/ethereum-classic:latest if needed.
name: retro-mike-ethereum-classic
services:
  app:
    container_name: etc
    image: local/ethereum-classic:latest
    restart: always
    volumes:
      - /media/ZimaOS-HD/NodeData/etc:/root/.ethereum-classic
    ports:
      - "9032:9032"
      - "8551:8551"
      - "30303:30303"
x-casaos:
  architectures:
    - amd64
  main: app
  description:
    en_us: Ethereum Classic node template. Build/import image first.
  tagline:
    en_us: Build-required node template for ETC.
  developer: Retro Mike
  author: Retro Mike
  icon: https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/ethereum-classic/icon.png
  thumbnail: ""
  title:
    en_us: Ethereum Classic (ETC) Node Template
  category: Templates
  port_map: "9032"

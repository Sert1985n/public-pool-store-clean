name: public-pool-webui-home
services:
  app:
    image: python:3.12-alpine
    container_name: public-pool-webui-home
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8500:8500"
    environment:
      - APP_MODE=home
      - PORT=8500
      - API_BTC=http://host.docker.internal:8501
      - API_BCH=http://host.docker.internal:8502
      - API_BSV=http://host.docker.internal:8503
      - API_FB=http://host.docker.internal:8504
      - API_LTC=http://host.docker.internal:8505
      - API_BTCS=http://host.docker.internal:8506
      - API_XEC=http://host.docker.internal:8507
      - API_DGB=http://host.docker.internal:8508
      - API_RVN=http://host.docker.internal:8509
    command:
      - /bin/sh
      - -lc
      - |
          set -eu
          apk add --no-cache wget tar
          mkdir -p /srv/site /srv/app
          wget -qO /tmp/site.tar.gz "https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-home/site.tar.gz"
          tar -xzf /tmp/site.tar.gz -C /srv/site
          wget -qO /srv/app/server.py "https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-home/server.py"
          SITE_ROOT=/srv/site python3 /srv/app/server.py
x-casaos:
  architectures:
    - amd64
    - arm64
  main: app
  store_app_id: public-pool-webui-home
  category: Web UI
  title:
    en_us: "Public Pool Web UI Home"
  tagline:
    en_us: "Molepool-based pool panel"
  description:
    en_us: "Panel from uploaded Molepool files with local API proxy for CasaOS."
  developer: "Public Pool"
  author: "Public Pool"
  icon: "https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-home/icon.png"
  thumbnail: "https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-home/icon.png"
  port_map: "8500"

# TEMPLATE APP
# Build/publish image from source first, then replace local/komodo:latest with your built image.
# Source repo: https://github.com/GLEECBTC/komodo-daemon
name: retro-mike-komodo
services:
  app:
    container_name: komodo
    image: local/komodo:latest
    restart: always
    volumes:
      - /media/ZimaOS-HD/NodeData/komodo:/root/.komodo
    ports:
      - "7035:7035"
      - "9035:9035"
      - "7770:7770"
x-casaos:
  architectures:
    - amd64
  main: app
  description:
    en_us: Komodo (KMD) Node Template. Template added to project structure. Build/import image first.
  tagline:
    en_us: Build-required node template for KMD.
  developer: Retro Mike
  author: Retro Mike
  icon: https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/komodo/icon.png
  thumbnail: ""
  title:
    en_us: Komodo (KMD) Node Template
  category: RetroMike
  port_map: "8888"

name: public-pool-webui-universal
services:
  app:
    image: theretromike/miningcorewebui:latest
    container_name: public-pool-webui-universal
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app.tar.gz:/opt/public-pool/app.tar.gz:ro
    ports:
      - "81:8080"
    environment:
      - API_BASE_URL=http://host.docker.internal:4000/api
      - MININGCORE_HOST=host.docker.internal
      - PLATFORM=ZIMAOS
      - POOL_NAME=public-pool-btc.ru
      - POSTGRES_DATABASE=miningcore
      - POSTGRES_HOST=host.docker.internal
      - POSTGRES_PASSWORD=miningcore
      - POSTGRES_USER=miningcore
      - PUID=1000
      - STRATUM_HOST=public-pool-btc.ru
    entrypoint:
      - /bin/sh
      - -lc
      - |
          set -eu
          rm -rf /app
          mkdir -p /app
          tar -xzf /opt/public-pool/app.tar.gz -C /
          exec dotnet /app/MiningCoreWebUI.dll
x-casaos:
  architectures:
    - amd64
    - arm64
  main: app
  store_app_id: public-pool-webui-universal
  category: Web UI
  title:
    en_us: Public Pool Web UI Universal
  tagline:
    en_us: One Miningcore panel for all coins
  description:
    en_us: One universal Miningcore web panel. Coins are loaded automatically from Miningcore API, so new pools appear after you add them in Miningcore config and restart Miningcore.
  developer: Public Pool
  author: Public Pool
  icon: https://raw.githubusercontent.com/TheRetroMike/retromike-umbrel-app-store/master/retro-mike-miningcore-webui/webui.png
  thumbnail: https://raw.githubusercontent.com/TheRetroMike/retromike-umbrel-app-store/master/retro-mike-miningcore-webui/webui.png
  port_map: "81"

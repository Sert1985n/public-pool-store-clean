name: public-pool-webui-home
services:
  app:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8500:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
x-casaos:
  architectures:
    - amd64
    - arm64
  main: app
  author: public-pool-btc.ru
  category: Web UI
  developer: public-pool-btc.ru
  icon: https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-home/icon.png
  thumbnail: https://raw.githubusercontent.com/Sert1985n/public-pool-store-clean/main/Apps/public-pool-webui-home/icon.png
  title:
    en_us: "Public Pool Web UI Home"
  tagline:
    en_us: "Main page 8500 for your SOLO pool"
  description:
    en_us: "Custom public-pool-btc.ru central page for BTC, BCH, BC2, BTCS, LCC, WJK and RVN with live Miningcore API stats."
  port_map: "8500"
